name: veritab-production

x-api-environment: &api-environment
  NODE_ENV: production
  PORT: 3001
  TRUST_PROXY: "true"
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
  JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
  JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
  JWT_ISSUER: ${JWT_ISSUER:-veritab-api}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-veritab-web}
  COOKIE_SECURE: "true"
  CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
  WEBHOOK_ENCRYPTION_KEY: ${WEBHOOK_ENCRYPTION_KEY:?WEBHOOK_ENCRYPTION_KEY is required}
  AI_BASE_URL: ${AI_BASE_URL:-}
  AI_API_KEY: ${AI_API_KEY:-}
  AI_MODEL: ${AI_MODEL:-}
  S3_ENDPOINT: ${S3_ENDPOINT:-}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:-}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}

x-runtime-security: &runtime-security
  read_only: true
  init: true
  restart: unless-stopped
  cap_drop: ["ALL"]
  security_opt: ["no-new-privileges:true"]
  tmpfs: ["/tmp:rw,noexec,nosuid,size=64m"]

services:
  postgres:
    image: postgres:16.9-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-veritab}
      POSTGRES_USER: ${POSTGRES_USER:-veritab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.4.5-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '$${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    restart: unless-stopped

  migrate:
    build: { context: ".", dockerfile: "Dockerfile", target: "migrate" }
    environment: *api-environment
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  api:
    build: { context: ".", dockerfile: "Dockerfile", target: "api-runtime" }
    environment: *api-environment
    command: ["node", "apps/api/dist/main.js"]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/v1/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    mem_limit: 768m
    cpus: 1.5
    <<: *runtime-security

  notification-worker:
    build: { context: ".", dockerfile: "Dockerfile", target: "api-runtime" }
    environment: *api-environment
    command: ["node", "apps/api/dist/notifications-worker.js"]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    mem_limit: 512m
    cpus: 1.0
    <<: *runtime-security

  maintenance-worker:
    build: { context: ".", dockerfile: "Dockerfile", target: "api-runtime" }
    environment: *api-environment
    command: ["node", "apps/api/dist/maintenance-worker.js"]
    depends_on:
      migrate: { condition: service_completed_successfully }
    mem_limit: 384m
    cpus: 0.5
    <<: *runtime-security

  web:
    build: { context: ".", dockerfile: "apps/web/Dockerfile" }
    depends_on:
      api: { condition: service_healthy }
    ports: ["127.0.0.1:${WEB_PORT:-8080}:8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
    mem_limit: 128m
    cpus: 0.5
    <<: *runtime-security

volumes:
  postgres-data:
  redis-data:
