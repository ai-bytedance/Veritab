name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.1
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Generate and validate Prisma client
        env:
          DATABASE_URL: postgresql://veritab:ci-only@localhost:5432/veritab?schema=public
        run: |
          npm run prisma:generate
          npm run prisma:validate

      - name: Type-check
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Validate production Compose file
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          REDIS_PASSWORD: ci-redis-password
          JWT_ACCESS_SECRET: ci-access-secret-at-least-32-characters-long
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters-long
          WEBHOOK_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
        run: docker compose -f compose.production.yaml config --quiet

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

