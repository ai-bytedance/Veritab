name: veritab

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: veritab
      POSTGRES_USER: veritab
      POSTGRES_PASSWORD: veritab_dev_only
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - veritab-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veritab -d veritab"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - veritab-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  veritab-postgres:
  veritab-redis:
